<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Угадай Цену | Guess the Price</title>
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --surface-hover: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent-color: #0a84ff;
            --success-color: #30d158;
            --danger-color: #ff453a;
            --border-radius: 20px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header & Stats */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .level-badge {
            background: linear-gradient(135deg, #0a84ff, #5e5ce6);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Main Container */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Game Card */
        .card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            width: 100%;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
        }

        .card.hidden {
            transform: translateY(30px) scale(0.95);
            opacity: 0;
            pointer-events: none;
        }

        .image-container {
            width: 100%;
            height: 320px;
            background: linear-gradient(145deg, #1e1e24, #121214);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .vector-display {
            font-size: 6.5rem;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
            transition: transform 0.5s ease;
            user-select: none;
        }

        .card:hover .vector-display {
            transform: scale(1.1) rotate(3deg);
        }

        .card-content {
            padding: 2rem 1.5rem 1.5rem 1.5rem;
            text-align: center;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        /* Controls */
        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }

        .currency-symbol {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            background-color: var(--surface-hover);
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 1rem 1rem 1rem 2.5rem;
            font-size: 1.5rem;
            color: var(--text-primary);
            font-family: var(--font-family);
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
            text-align: left;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
            background-color: #333336;
        }

        .formatted-preview {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            color: var(--accent-color);
            min-height: 20px;
            margin-bottom: 0.5rem;
            padding-left: 10px;
        }

        button {
            width: 100%;
            background-color: var(--text-primary);
            color: var(--bg-color);
            border: none;
            border-radius: 14px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-family: var(--font-family);
        }

        button:hover {
            background-color: #e5e5ea;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button.btn-next {
            background-color: var(--accent-color);
            color: white;
            margin-top: 1rem;
        }

        button.btn-next:hover {
            background-color: #0071e3;
        }

        /* Results Screen */
        .result-screen {
            display: none;
            padding: 1.5rem;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .result-screen.active {
            display: block;
        }

        .controls.hidden {
            display: none;
        }

        .real-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--success-color);
            margin-bottom: 0.5rem;
        }

        .error-rate {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .points-earned {
            display: inline-block;
            background: rgba(48, 209, 88, 0.15);
            color: var(--success-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* Leaderboard Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .record-list {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .record-item:last-child { border-bottom: none; }

        .btn-close {
            background: var(--surface-hover);
            color: white;
        }

        .btn-leaderboard {
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 0.5rem;
            width: auto;
            margin-top: 1rem;
            text-decoration: underline;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            z-index: 9999;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            header { padding: 1rem; flex-direction: column; gap: 1rem; }
            .stats { width: 100%; justify-content: space-between; }
            .image-container { height: 240px; }
            .real-price { font-size: 2rem; }
        }
    </style>
</head>

            ["Скрипка Страдивари", "Исторический музыкальный инструмент", 15000000, "🎻🎼"],
            ["Карточка Charizard (1st Edition)", "Редкая коллекционная карточка Pokemon (PSA 10)", 300000, "🐉🃏"],
            ["Комикс Action Comics #1", "Первое появление Супермена", 3200000, "🦸‍♂️📖"],
            ["Кофе Kopi Luwak (1 кг)", "Один из самых дорогих сортов кофе в мире", 1300, "☕🐈"],
            ["Шафран (1 кг)", "Самая дорогая в мире специя", 2500, "🪻🌿"],
            ["Слиток золота (1 кг)", "Стандартный золотой слиток высокой пробы", 65000, "🪙👑"],
            ["Билет в космос (Virgin Galactic)", "Суборбитальный туристический полет", 450000, "🚀🌌"],
            ["Болид Формулы-1 (б/у)", "Списанный гоночный автомобиль без двигателя", 1500000, "🏎️🏁"],
            ["Робот-собака Boston Dynamics Spot", "Технологичный четырехногий робот", 75000, "🤖🐕"],
            ["Кресло Eames Lounge Chair", "Культовое дизайнерское кресло", 7500, "🪑🛋️"],
            ["Камера Leica M11", "Премиальная дальномерная камера", 8995, "📷🔴"],
            ["Моноколесо Begode Master", "Мощный электротранспорт для экстремалов", 3200, "🛞⚡"],
            ["Голубой тунец (целиком)", "Редкая рыба для премиальных суши", 150000, "🐟🍣"],
            ["Игровая мышь Finalmouse", "Лимитированная ультралегкая мышь", 190, "🖱️🔥"],
            ["Шлем пилота F-35", "Высокотехнологичный шлем с AR-интерфейсом", 400000, "🪖🛩️"],
            ["Биткоин (1 BTC)", "Самая популярная криптовалюта (условный курс)", 60000, "🪙⚡"]
        ];

        const items = dbRaw.map((item, index) => ({
            id: index,
            name: item[0],
            desc: item[1],
            price: item[2],
            icon: item[3]
        }));

        // --- Состояние игры ---
        let currentItem = null;
        let score = parseInt(localStorage.getItem('guessPrice_score')) || 0;
        let streak = parseInt(localStorage.getItem('guessPrice_streak')) || 0;
        let playedItems = JSON.parse(localStorage.getItem('guessPrice_played')) || [];
        
        const levels = [
            { name: "Новичок", min: 0 },
            { name: "Любитель", min: 5000 },
            { name: "Эксперт", min: 15000 },
            { name: "Миллионер", min: 50000 },
            { name: "Ценовой Гуру", min: 150000 }
        ];

        // --- DOM Элементы ---
        const elScore = document.getElementById('ui-score');
        const elStreak = document.getElementById('ui-streak');
        const elLevel = document.getElementById('ui-level');
        const elCard = document.getElementById('game-card');
        const elPlaceholder = document.getElementById('vector-placeholder');
        const elName = document.getElementById('item-name');
        const elDesc = document.getElementById('item-desc');
        const elInput = document.getElementById('price-input');
        const elPreview = document.getElementById('price-preview');
        const elBtnGuess = document.getElementById('btn-guess');
        const elControls = document.getElementById('controls');
        
        const elResult = document.getElementById('result-screen');
        const elResPrice = document.getElementById('res-price');
        const elResError = document.getElementById('res-error');
        const elResPoints = document.getElementById('res-points');
        const elBtnNext = document.getElementById('btn-next');

        const elBtnShowLb = document.getElementById('btn-show-lb');
        const elBtnCloseLb = document.getElementById('btn-close-lb');
        const elModal = document.getElementById('lb-modal');
        const elLbList = document.getElementById('lb-list');

        // --- Инициализация ---
        function init() {
            updateUI();
            nextRound();
        }

        function updateUI() {
            elScore.innerText = formatNumber(score);
            elStreak.innerText = streak + " 🔥";
            
            let currentLevel = levels[0].name;
            for(let i=levels.length-1; i>=0; i--) {
                if(score >= levels[i].min) {
                    currentLevel = levels[i].name;
                    break;
                }
            }
            elLevel.innerText = currentLevel;
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        // --- Логика игры ---
        function nextRound() {
            elResult.classList.remove('active');
            elControls.classList.remove('hidden');
            elInput.value = '';
            elPreview.innerText = '';
            
            // Анимация скрытия карточки
            elCard.classList.add('hidden');
            
            setTimeout(() => {
                if (playedItems.length >= items.length) playedItems = [];
                
                let availableItems = items.filter(i => !playedItems.includes(i.id));
                currentItem = availableItems[Math.floor(Math.random() * availableItems.length)];
                playedItems.push(currentItem.id);
                localStorage.setItem('guessPrice_played', JSON.stringify(playedItems));

                elName.innerText = currentItem.name;
                elDesc.innerText = currentItem.desc;
                
                // Рендерим иконку вместо внешней картинки (100% автономность)
                elPlaceholder.innerText = currentItem.icon;
                
                elCard.classList.remove('hidden');
                elInput.focus();
            }, 400);
        }

        function handleGuess() {
            const guess = parseInt(elInput.value);
            if (isNaN(guess) || guess <= 0) return;

            const real = currentItem.price;
            const errorRate = (Math.abs(guess - real) / real) * 100;
            
            let earned = 0;
            if (errorRate <= 100) {
                earned = Math.floor(1000 * (1 - errorRate/100));
                
                if (errorRate <= 15) {
                    streak++;
                    const multiplier = 1 + (streak * 0.1);
                    earned = Math.floor(earned * multiplier);
                } else {
                    streak = 0;
                }

                if (errorRate < 5) {
                    earned += 500;
                    fireConfetti();
                }
            } else {
                streak = 0;
            }

            score += earned;
            localStorage.setItem('guessPrice_score', score);
            localStorage.setItem('guessPrice_streak', streak);
            
            saveToLeaderboard(score);
            updateUI();

            elControls.classList.add('hidden');
            elResPrice.innerText = `$${formatNumber(real)}`;
            
            elResError.innerText = `Ошибка: ${errorRate.toFixed(1)}%`;
            elResError.style.color = errorRate < 15 ? "var(--success-color)" : (errorRate > 50 ? "var(--danger-color)" : "var(--text-secondary)");
            
            elResPoints.innerText = earned > 0 ? `+${formatNumber(earned)} очков` : "0 очков";
            
            elResult.classList.add('active');
        }

        // --- Таблица рекордов ---
        function saveToLeaderboard(newScore) {
            let lb = JSON.parse(localStorage.getItem('guessPrice_lb')) || [];
            lb.push({ date: new Date().toLocaleDateString(), score: newScore });
            lb.sort((a,b) => b.score - a.score);
            
            let uniqueLb = [];
            let seen = new Set();
            for(let item of lb) {
                if(!seen.has(item.score)) {
                    seen.add(item.score);
                    uniqueLb.push(item);
                }
            }
            localStorage.setItem('guessPrice_lb', JSON.stringify(uniqueLb.slice(0, 5)));
        }

        function showLeaderboard() {
            let lb = JSON.parse(localStorage.getItem('guessPrice_lb')) || [];
            elLbList.innerHTML = '';
            
            if(lb.length === 0) {
                elLbList.innerHTML = '<li style="text-align:center; color:gray">Пока нет рекордов</li>';
            } else {
                lb.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'record-item';
                    let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '▪️';
                    li.innerHTML = `<span>${medal} ${formatNumber(item.score)} очков</span> <span><small style="color:var(--text-secondary)">${item.date}</small></span>`;
                    elLbList.appendChild(li);
                });
            }
            elModal.classList.add('active');
        }

        // --- Конфетти ---
        function fireConfetti() {
            const colors = ['#0a84ff', '#30d158', '#ff9f0a', '#ff453a', '#bf5af2'];
            for(let i=0; i<60; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(conf);
                
                setTimeout(() => conf.remove(), 4000);
            }
        }

        // --- Слушатели событий ---
        elBtnGuess.addEventListener('click', handleGuess);
        elBtnNext.addEventListener('click', nextRound);
        
        elInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleGuess();
        });

        elInput.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if (!isNaN(val)) {
                elPreview.innerText = "$ " + formatNumber(val);
            } else {
                elPreview.innerText = "";
            }
        });

        elBtnShowLb.addEventListener('click', showLeaderboard);
        elBtnCloseLb.addEventListener('click', () => elModal.classList.remove('active'));
        elModal.addEventListener('click', (e) => {
            if(e.target === elModal) elModal.classList.remove('active');
        });

        init();
    </script>
</body>
</html>
